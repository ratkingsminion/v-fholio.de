<!DOCTYPE html>
<html lang="en">
<head>

</head>
<body class="w3-content">
	<div class="page">
		@include 'includes/banner.html'
	
		<div class="w3-container title elem">
			@{md_nop(imprint.title)}
		</div>

		@include 'includes/topmenu.html'

				@{md(text.text)}

		</div>

	@include 'includes/footer.html'

	@include 'includes/uparrow.html'
